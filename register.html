<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | ChalkMaster</title>
    <link rel="icon" type="image/svg+xml" href="assets/img/favicon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-light">
    <!-- Page Toggles -->
    <div class="position-fixed top-0 end-0 p-3 z-3 d-flex gap-2">
        <button id="rtlToggle" class="btn page-toggle" title="Toggle RTL">
            <span style="font-weight: 800; font-size: 0.65rem;">RTL</span>
        </button>
        <button id="themeToggle" class="btn page-toggle" title="Toggle Theme">
            <i class="bi bi-moon-fill"></i>
        </button>
    </div>



    <main class="d-flex align-items-center min-vh-100 py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-5 col-xl-4">
                    <div class="card shadow-sm border-0 rounded-4">
                        <div class="card-body p-4 p-md-5">
                            <div class="text-center mb-4">
                                <a class="navbar-brand justify-content-center fs-2 mb-3" href="index.html">
                                    <i class="bi bi-brush"></i> ChalkMaster
                                </a>
                                <h3>Create Account</h3>
                                <p class="text-secondary">Join ChalkMaster today</p>
                            </div>
                            
                            <form class="needs-validation" novalidate>
                                <div class="mb-3">
                                    <label class="form-label">Full Name</label>
                                    <input type="text" class="form-control" placeholder="John Doe" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Email Address</label>
                                    <input type="email" class="form-control" placeholder="name@example.com" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Password</label>
                                    <div class="password-field">
                                        <input type="password" class="form-control" placeholder="••••••••" required>
                                        <span class="password-toggle"><i class="bi bi-eye"></i></span>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Confirm Password</label>
                                    <div class="password-field">
                                        <input type="password" class="form-control" placeholder="••••••••" required>
                                        <span class="password-toggle"><i class="bi bi-eye"></i></span>
                                    </div>
                                </div>
                                <div class="mb-4 form-check">
                                    <input type="checkbox" class="form-check-input" id="terms" required>
                                    <label class="form-check-label small" for="terms">I agree to the <a href="#" class="text-primary text-decoration-none">Terms</a> and <a href="#" class="text-primary text-decoration-none">Privacy Policy</a></label>
                                </div>
                                <button type="submit" class="btn btn-primary w-100 mb-4">Sign Up</button>
                                
                                <div class="position-relative mb-4">
                                    <hr class="text-secondary">
                                    <span class="position-absolute top-50 start-50 translate-middle px-2 divider-text small">or sign up with</span>
                                </div>
                                
                                <div class="d-flex gap-2 mb-4">
                                    <button type="button" class="btn btn-outline-secondary w-100 py-2 d-flex align-items-center justify-content-center gap-2">
                                        <i class="bi bi-google"></i> Google
                                    </button>
                                    <button type="button" class="btn btn-outline-secondary w-100 py-2 d-flex align-items-center justify-content-center gap-2">
                                        <i class="bi bi-apple"></i> Apple
                                    </button>
                                </div>
                                
                                <p class="text-center mb-0 text-secondary">
                                    Already have an account? <a href="login.html" class="text-primary fw-bold text-decoration-none">Log In</a>
                                </p>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
